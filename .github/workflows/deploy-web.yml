name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cloudy.App/cloudy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env from secret
        run: echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" > .env

      - name: Strip native-only dependency for web build
        # liquid_glass_renderer is native-only (macOS/iOS/Android) and bundles
        # shaders that fail to compile for web. The app already uses a
        # conditional import so web never references the package — removing it
        # here keeps its shaders out of the web bundle.
        run: |
          sed -i '/^  liquid_glass_renderer:/d' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        # base-href must match the repo name so assets resolve at
        # https://<user>.github.io/Cloudy/
        run: flutter build web --release --base-href /Cloudy/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Cloudy.App/cloudy/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
